<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>方位磁針</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f0f0f0;
  }

  #compass {
    width: 200px;
    transition: transform 0.5s;
    cursor: pointer;
  }
</style>
</head>

<body>

<img id="compass" src="https://aiwo-komete.com/wp-content/uploads/2023/06/compass-300x300.png">

<script>
const compass = document.getElementById("compass");
let rotated = false;

compass.addEventListener("click", () => {
  rotated = !rotated;
  compass.style.transform = rotated ? "rotate(180deg)" : "rotate(0deg)";
});
</script>

</body>
</html>
